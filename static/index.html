<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RetroBoard – Sprint Retrospectives</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #FAF7F2;
    --bg2:       #F3EFE8;
    --surface:   #FFFFFF;
    --card:      #FFFFFF;
    --border:    #E8E2D9;
    --border2:   #D5CEC4;
    --primary:   #E85D3F;
    --primary-d: #C94830;
    --primary-l: #FDF0ED;
    --teal:      #2A9D8F;
    --teal-l:    #E8F5F4;
    --amber:     #E9A227;
    --amber-l:   #FEF6E4;
    --sage:      #6B9E7A;
    --sage-l:    #EEF5F0;
    --navy:      #264653;
    --text:      #1C1917;
    --text2:     #44403C;
    --muted:     #78716C;
    --muted2:    #A8A29E;
    --radius:    16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);

    /* Sticky note colors */
    --note-1: #FFF9C4;
    --note-2: #FFE0B2;
    --note-3: #F8BBD9;
    --note-4: #C8E6C9;
    --note-5: #B3E5FC;
    --note-6: #E1BEE7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .4;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Fonts ── */
  .font-display { font-family: 'Playfair Display', serif; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  @keyframes slideRight {
    from { opacity:0; transform:translateX(-20px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(.85) rotate(-2deg); }
    70%  { transform:scale(1.03) rotate(.5deg); }
    100% { opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes reveal-note {
    0%   { opacity:0; transform:scale(.88) rotate(var(--tilt)) translateY(20px); filter:blur(6px); }
    60%  { filter:blur(0); }
    100% { opacity:1; transform:scale(1) rotate(var(--tilt)) translateY(0); filter:blur(0); }
  }
  @keyframes shimmer {
    0%   { background-position:-200% 0; }
    100% { background-position:200% 0; }
  }
  @keyframes timerPulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.7; transform:scale(.97); }
  }
  @keyframes warnPulse {
    0%,100% { background:var(--primary-l); }
    50%     { background:#FDD; }
  }
  @keyframes float {
    0%,100% { transform:translateY(0px); }
    50%     { transform:translateY(-6px); }
  }
  @keyframes spin {
    to { transform:rotate(360deg); }
  }
  @keyframes confetti {
    0%   { transform:translateY(-10px) rotate(0deg) scale(1); opacity:1; }
    100% { transform:translateY(80px) rotate(540deg) scale(0); opacity:0; }
  }

  .anim-fade-up  { animation:fadeUp .5s cubic-bezier(.34,1.1,.64,1) both; }
  .anim-fade-in  { animation:fadeIn .4s ease both; }
  .anim-pop-in   { animation:popIn .45s cubic-bezier(.34,1.4,.64,1) both; }
  .anim-slide-r  { animation:slideRight .4s ease both; }

  /* ── Nav ── */
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px;
    background:rgba(250,247,242,.92);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:200;
  }
  .logo {
    display:flex; align-items:center; gap:10px;
    text-decoration:none;
  }
  .logo-mark {
    width:34px; height:34px; border-radius:10px;
    background:var(--primary);
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; box-shadow:0 4px 12px rgba(232,93,63,.3);
  }
  .logo-text {
    font-family:'Playfair Display',serif;
    font-size:1.2rem; font-weight:800;
    color:var(--text); letter-spacing:-.02em;
  }
  .logo-text span { color:var(--primary); }

  .nav-right { display:flex; align-items:center; gap:10px; }

  /* ── Buttons ── */
  .btn {
    display:inline-flex; align-items:center; gap:7px;
    padding:10px 20px; border-radius:var(--radius-sm);
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.88rem; font-weight:600;
    cursor:pointer; border:none;
    transition:all .18s cubic-bezier(.34,1.2,.64,1);
    text-decoration:none; white-space:nowrap; letter-spacing:-.01em;
  }
  .btn-primary {
    background:var(--primary); color:#fff;
    box-shadow:0 4px 14px rgba(232,93,63,.3);
  }
  .btn-primary:hover { background:var(--primary-d); transform:translateY(-2px); box-shadow:0 8px 20px rgba(232,93,63,.4); }
  .btn-primary:active { transform:translateY(0); }

  .btn-outline {
    background:var(--surface); color:var(--text2);
    border:1.5px solid var(--border2);
    box-shadow:var(--shadow-sm);
  }
  .btn-outline:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-l); transform:translateY(-1px); }

  .btn-teal { background:var(--teal); color:#fff; box-shadow:0 4px 14px rgba(42,157,143,.3); }
  .btn-teal:hover { background:#238C7F; transform:translateY(-2px); }

  .btn-amber { background:var(--amber); color:#fff; box-shadow:0 4px 14px rgba(233,162,39,.3); }
  .btn-amber:hover { background:#D4921F; transform:translateY(-2px); }

  .btn-sage { background:var(--sage); color:#fff; box-shadow:0 4px 14px rgba(107,158,122,.3); }
  .btn-sage:hover { background:#5A8C69; transform:translateY(-2px); }

  .btn-danger { background:#FEE2E2; color:#DC2626; border:1.5px solid #FECACA; }
  .btn-danger:hover { background:#FED4D4; transform:translateY(-1px); }

  .btn-ghost { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
  .btn-ghost:hover { background:var(--bg2); color:var(--text2); }

  .btn-sm { padding:7px 14px; font-size:.8rem; border-radius:8px; }
  .btn-lg { padding:14px 32px; font-size:1rem; border-radius:12px; }
  .btn-xl { padding:16px 40px; font-size:1.05rem; border-radius:14px; }
  .btn:disabled { opacity:.45; cursor:not-allowed; pointer-events:none; }

  /* ── Inputs ── */
  .input, .textarea {
    width:100%; padding:12px 16px;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text);
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.95rem;
    transition:all .18s; outline:none;
    box-shadow:var(--shadow-sm);
  }
  .input:focus, .textarea:focus {
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(232,93,63,.12), var(--shadow-sm);
  }
  .textarea { resize:vertical; min-height:80px; line-height:1.6; }
  .label {
    font-size:.75rem; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.08em;
    margin-bottom:8px; display:block;
  }

  /* ── Landing ── */
  .landing {
    min-height:calc(100vh - 67px);
    display:flex; align-items:center; justify-content:center;
    padding:60px 24px;
    position:relative; overflow:hidden;
  }

  /* Decorative blobs */
  .landing::before {
    content:'';
    position:absolute; width:600px; height:600px;
    background:radial-gradient(circle, rgba(232,93,63,.08) 0%, transparent 70%);
    top:-100px; right:-100px; pointer-events:none;
  }
  .landing::after {
    content:'';
    position:absolute; width:400px; height:400px;
    background:radial-gradient(circle, rgba(42,157,143,.06) 0%, transparent 70%);
    bottom:-80px; left:-80px; pointer-events:none;
  }

  /* Floating decorative elements */
  .deco-note {
    position:absolute; border-radius:4px;
    padding:10px 14px; font-size:.78rem; font-weight:600;
    box-shadow:var(--shadow); opacity:.7; pointer-events:none;
    animation:float 4s ease-in-out infinite;
  }

  .landing-inner { width:100%; max-width:580px; position:relative; z-index:1; }

  .landing-eyebrow {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--primary-l); border:1px solid rgba(232,93,63,.2);
    border-radius:99px; padding:6px 16px;
    font-size:.78rem; font-weight:700; color:var(--primary);
    text-transform:uppercase; letter-spacing:.08em;
    margin-bottom:24px;
  }
  .eyebrow-dot { width:6px; height:6px; border-radius:50%; background:var(--primary); animation:timerPulse 1.5s infinite; }

  .landing-title {
    font-family:'Playfair Display',serif;
    font-size:clamp(2.6rem,6vw,3.8rem);
    font-weight:900; line-height:1.08;
    letter-spacing:-.03em; margin-bottom:20px;
    color:var(--text);
  }
  .landing-title .accent { color:var(--primary); font-style:italic; }

  .landing-sub {
    color:var(--muted); font-size:1.05rem;
    line-height:1.75; margin-bottom:40px;
    font-weight:400;
  }

  /* Card panel */
  .panel {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:20px;
    box-shadow:var(--shadow-lg);
    overflow:hidden;
  }
  .panel-tabs {
    display:flex; border-bottom:1px solid var(--border);
    background:var(--bg2);
  }
  .panel-tab {
    flex:1; padding:14px 20px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.88rem; font-weight:600;
    cursor:pointer; border:none; background:transparent;
    color:var(--muted); transition:all .18s;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .panel-tab.active {
    color:var(--primary); background:var(--surface);
    border-bottom-color:var(--primary);
  }
  .panel-body { padding:28px; }

  /* Section builder */
  .section-item {
    display:grid; grid-template-columns:1fr 80px 32px;
    gap:8px; align-items:center;
    padding:10px 14px;
    background:var(--bg); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); margin-bottom:8px;
    transition:border-color .15s;
  }
  .section-item:hover { border-color:var(--border2); }
  .section-item input[type=text] {
    background:transparent; border:none; outline:none;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.9rem; color:var(--text); font-weight:500;
  }
  .section-item input[type=text]::placeholder { color:var(--muted2); }
  .time-input {
    padding:6px 10px; background:var(--surface);
    border:1.5px solid var(--border); border-radius:8px;
    color:var(--text); font-size:.88rem; text-align:center;
    font-family:'Plus Jakarta Sans',sans-serif; outline:none;
    transition:border-color .15s;
  }
  .time-input:focus { border-color:var(--primary); }
  .remove-btn {
    width:28px; height:28px; border-radius:50%;
    border:none; background:transparent; cursor:pointer;
    color:var(--muted2); font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .remove-btn:hover { background:#FEE2E2; color:#DC2626; }

  .add-section-btn {
    width:100%; padding:10px;
    border:1.5px dashed var(--border2); border-radius:var(--radius-sm);
    background:transparent; color:var(--muted);
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.88rem; font-weight:600;
    cursor:pointer; transition:all .18s; margin-bottom:20px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .add-section-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-l); }

  /* ── Share box ── */
  .share-strip {
    background:var(--teal-l);
    border-bottom:1px solid rgba(42,157,143,.15);
    padding:10px 28px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .share-label { font-size:.75rem; font-weight:700; color:var(--teal); text-transform:uppercase; letter-spacing:.06em; }
  .share-url-box {
    flex:1; max-width:480px;
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid rgba(42,157,143,.25);
    border-radius:8px; padding:7px 14px;
  }
  .share-url { flex:1; font-size:.83rem; color:var(--teal); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }

  /* ── Phase banner ── */
  .phase-banner {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:14px 28px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
  }
  .phase-left { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .section-label-small {
    font-size:.7rem; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px;
  }
  .section-name-big {
    font-family:'Playfair Display',serif;
    font-size:1.2rem; font-weight:800; color:var(--text);
  }

  /* Phase pill */
  .phase-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:99px;
    font-size:.78rem; font-weight:700; letter-spacing:.02em;
  }
  .pill-waiting  { background:var(--bg2); color:var(--muted); border:1px solid var(--border2); }
  .pill-input    { background:var(--primary-l); color:var(--primary); border:1px solid rgba(232,93,63,.2); animation:timerPulse 2s infinite; }
  .pill-revealed { background:var(--teal-l); color:var(--teal); border:1px solid rgba(42,157,143,.2); }
  .pill-voting   { background:var(--amber-l); color:var(--amber); border:1px solid rgba(233,162,39,.2); }
  .pill-done     { background:var(--sage-l); color:var(--sage); border:1px solid rgba(107,158,122,.2); }
  .pill-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

  /* ── Timer ── */
  .timer-block {
    display:flex; align-items:center; gap:14px;
    background:var(--bg); border:1.5px solid var(--border);
    border-radius:12px; padding:10px 16px;
  }
  .timer-ring { position:relative; width:48px; height:48px; flex-shrink:0; }
  .timer-ring svg { transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--border2); stroke-width:3.5; }
  .ring-fg { fill:none; stroke:var(--primary); stroke-width:3.5; stroke-linecap:round; transition:stroke-dashoffset .5s ease; }
  .ring-fg.warn { stroke:#DC2626; }
  .ring-text {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:.68rem; font-weight:800; color:var(--text);
    font-family:'Playfair Display',serif;
  }
  .ring-text.warn { color:#DC2626; }
  .timer-info { line-height:1.3; }
  .timer-label { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .timer-value { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:800; color:var(--text); }
  .timer-value.warn { color:#DC2626; animation:timerPulse 1s infinite; }

  /* ── Progress steps ── */
  .steps { display:flex; align-items:center; gap:0; }
  .step-item { display:flex; align-items:center; }
  .step-dot {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.72rem; font-weight:800;
    border:2px solid var(--border2); background:var(--bg);
    color:var(--muted); transition:all .3s;
    font-family:'Playfair Display',serif;
  }
  .step-dot.active { border-color:var(--primary); background:var(--primary-l); color:var(--primary); }
  .step-dot.done { border-color:var(--sage); background:var(--sage-l); color:var(--sage); }
  .step-line { width:28px; height:2px; background:var(--border); transition:background .3s; }
  .step-line.done { background:var(--sage); }

  /* ── Facilitator Panel ── */
  .fac-panel {
    background:linear-gradient(135deg, #FFF8F6, #FFF);
    border-bottom:1px solid rgba(232,93,63,.15);
    padding:14px 28px;
  }
  .fac-panel-header {
    display:flex; align-items:center; gap:10px; margin-bottom:12px;
  }
  .fac-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--primary); color:#fff;
    border-radius:99px; padding:4px 12px;
    font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  }
  .fac-divider { flex:1; height:1px; background:rgba(232,93,63,.15); }
  .fac-controls { display:flex; flex-wrap:wrap; gap:8px; }

  /* ── Board ── */
  .board-wrap { flex:1; padding:24px; overflow:auto; }
  .board-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }

  .board-col {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow-sm);
    min-height:420px;
  }
  .col-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .col-icon {
    width:32px; height:32px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem;
  }
  .col-title-text {
    font-family:'Playfair Display',serif;
    font-size:.95rem; font-weight:800; color:var(--text);
    flex:1;
  }
  .col-count {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:99px; padding:2px 10px;
    font-size:.75rem; font-weight:700; color:var(--muted);
  }
  .col-body { padding:16px; }

  /* ── Sticky Notes ── */
  .sticky-note {
    border-radius:4px;
    padding:14px 16px; margin-bottom:14px;
    box-shadow:2px 3px 10px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.06);
    position:relative; cursor:default;
    transform:rotate(var(--tilt, 0deg));
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .sticky-note::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background:rgba(0,0,0,.06); border-radius:4px 4px 0 0;
  }
  .sticky-note:hover {
    transform:rotate(0deg) translateY(-2px);
    box-shadow:4px 8px 20px rgba(0,0,0,.15);
    z-index:10;
  }
  .sticky-note.revealed { animation:reveal-note .55s cubic-bezier(.34,1.2,.64,1) both; }
  .sticky-note.highlighted {
    outline:3px solid var(--amber);
    box-shadow:4px 8px 24px rgba(233,162,39,.3), 2px 3px 10px rgba(0,0,0,.1);
  }

  .note-text { font-size:.92rem; line-height:1.6; color:#2C2C2C; font-weight:500; margin-bottom:10px; }
  .note-author { font-size:.74rem; color:rgba(0,0,0,.45); font-weight:600; margin-bottom:8px; }
  .note-actions { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

  /* Vote button on note */
  .vote-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:99px;
    border:1.5px solid rgba(0,0,0,.15);
    background:rgba(255,255,255,.6);
    color:rgba(0,0,0,.5); font-size:.78rem; font-weight:700;
    cursor:pointer; transition:all .15s;
    backdrop-filter:blur(4px);
  }
  .vote-btn:hover { border-color:var(--primary); color:var(--primary); background:rgba(255,255,255,.9); }
  .vote-btn.voted { border-color:var(--primary); color:var(--primary); background:rgba(232,93,63,.15); }
  .vote-circle { width:7px; height:7px; border-radius:50%; background:currentColor; }

  /* Action btn on note */
  .note-action-btn {
    padding:3px 9px; border-radius:6px;
    border:1px solid rgba(0,0,0,.12);
    background:rgba(255,255,255,.6);
    font-size:.74rem; font-weight:600; color:rgba(0,0,0,.45);
    cursor:pointer; transition:all .15s;
  }
  .note-action-btn:hover { background:rgba(255,255,255,.9); color:rgba(0,0,0,.7); }
  .note-action-btn.danger:hover { background:#FEE2E2; color:#DC2626; border-color:#FECACA; }
  .note-action-btn.star { color:rgba(0,0,0,.35); }
  .note-action-btn.star.on { color:var(--amber); border-color:rgba(233,162,39,.4); background:rgba(233,162,39,.1); }

  /* ── Hidden note placeholders ── */
  .hidden-note {
    background:var(--bg2);
    border:1.5px dashed var(--border2);
    border-radius:10px; padding:14px 16px; margin-bottom:12px;
  }
  .shimmer-line {
    height:11px; border-radius:6px; margin-bottom:7px;
    background:linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
    background-size:200% auto;
    animation:shimmer 1.8s infinite;
  }
  .hidden-label { font-size:.73rem; color:var(--muted2); font-weight:600; margin-top:8px; }

  /* ── Input Phase ── */
  .input-phase-wrap { flex:1; display:flex; gap:0; }
  .input-sidebar {
    width:340px; flex-shrink:0;
    background:var(--surface); border-right:1px solid var(--border);
    padding:24px; overflow-y:auto;
  }
  .input-preview { flex:1; padding:24px; overflow-y:auto; }

  .my-card-item {
    background:var(--bg); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:10px;
    display:flex; align-items:flex-start; gap:10px;
    transition:border-color .18s; position:relative;
  }
  .my-card-item:focus-within { border-color:var(--primary); background:var(--primary-l); }
  .my-card-item textarea {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Plus Jakarta Sans',sans-serif;
    font-size:.9rem; resize:none; line-height:1.6; min-height:44px;
  }

  .add-card-input-btn {
    width:100%; padding:11px;
    border:1.5px dashed var(--border2); border-radius:var(--radius-sm);
    background:transparent; color:var(--muted);
    font-family:'Plus Jakarta Sans',sans-serif; font-size:.85rem; font-weight:600;
    cursor:pointer; transition:all .18s; margin-top:8px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .add-card-input-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-l); }

  /* ── Waiting screen ── */
  .waiting-screen {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:60px 24px;
    text-align:center;
  }
  .waiting-emoji {
    font-size:3.5rem; margin-bottom:20px;
    animation:float 3s ease-in-out infinite;
  }
  .waiting-title {
    font-family:'Playfair Display',serif;
    font-size:1.8rem; font-weight:800; margin-bottom:12px;
  }
  .waiting-sub { color:var(--muted); font-size:.95rem; line-height:1.7; max-width:400px; }

  /* ── Participants bar ── */
  .participants-bar {
    background:var(--surface); border-top:1px solid var(--border);
    padding:12px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .p-label { font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .p-chip {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:99px; padding:5px 12px;
    font-size:.8rem; color:var(--text2); font-weight:500;
  }
  .p-avatar {
    width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.65rem; font-weight:800; color:#fff;
    flex-shrink:0;
  }
  .p-fac-badge { font-size:.68rem; color:var(--primary); font-weight:700; }

  /* ── Setup / Join screen ── */
  .setup-wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:60px 24px;
    background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(232,93,63,.05), transparent);
  }
  .setup-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:24px; padding:40px; width:100%; max-width:460px;
    box-shadow:var(--shadow-lg); animation:fadeUp .45s ease;
  }
  .setup-emoji { font-size:2.8rem; margin-bottom:16px; display:block; }
  .setup-title {
    font-family:'Playfair Display',serif;
    font-size:1.9rem; font-weight:900; margin-bottom:8px; color:var(--text);
  }
  .setup-sub { color:var(--muted); font-size:.93rem; margin-bottom:28px; line-height:1.65; }

  .checkbox-row {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-radius:var(--radius-sm);
    border:1.5px solid var(--border); background:var(--bg);
    margin-bottom:24px; cursor:pointer; transition:all .15s;
  }
  .checkbox-row:hover { border-color:var(--primary); background:var(--primary-l); }
  .checkbox-row input { accent-color:var(--primary); width:16px; height:16px; cursor:pointer; flex-shrink:0; }
  .checkbox-label { font-size:.9rem; font-weight:500; color:var(--text2); flex:1; }
  .fac-warning {
    display:inline-flex; align-items:center; gap:5px;
    background:#FEE2E2; border:1px solid #FECACA;
    border-radius:99px; padding:3px 10px;
    font-size:.73rem; font-weight:700; color:#DC2626;
  }

  /* ── Comments ── */
  .comments-area { margin-top:10px; padding-top:10px; border-top:1px solid rgba(0,0,0,.08); }
  .comment-row { margin-bottom:7px; }
  .comment-author-sm { font-size:.7rem; color:rgba(0,0,0,.4); font-weight:600; margin-bottom:2px; }
  .comment-text-sm { font-size:.8rem; color:rgba(0,0,0,.6); line-height:1.5; }
  .comment-input-row { display:flex; gap:6px; margin-top:8px; }
  .comment-input {
    flex:1; padding:6px 10px;
    background:rgba(255,255,255,.7); border:1px solid rgba(0,0,0,.15);
    border-radius:7px; color:var(--text); font-size:.8rem; outline:none;
    font-family:'Plus Jakarta Sans',sans-serif;
    transition:border-color .15s;
  }
  .comment-input:focus { border-color:var(--primary); }

  /* ── ROTI ── */
  .roti-section { padding:32px; max-width:480px; margin:0 auto; }
  .roti-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:20px; padding:32px; text-align:center;
    box-shadow:var(--shadow);
  }
  .roti-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; margin-bottom:8px; }
  .roti-sub { color:var(--muted); font-size:.9rem; margin-bottom:24px; line-height:1.6; }
  .roti-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .roti-btn {
    width:56px; height:56px; border-radius:50%;
    border:2px solid var(--border2); background:var(--bg);
    font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:900;
    color:var(--muted); cursor:pointer; transition:all .2s;
  }
  .roti-btn:hover { border-color:var(--primary); transform:scale(1.12); }
  .roti-btn.selected {
    border-color:var(--primary); background:var(--primary);
    color:#fff; transform:scale(1.18);
    box-shadow:0 6px 16px rgba(232,93,63,.35);
  }
  .roti-avg { margin-top:16px; color:var(--muted); font-size:.88rem; }
  .roti-avg strong { color:var(--amber); font-weight:700; }

  /* ── Votes remaining ── */
  .votes-remaining {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--amber-l); border:1px solid rgba(233,162,39,.25);
    border-radius:99px; padding:7px 16px;
    font-size:.83rem; font-weight:700; color:var(--amber);
    margin-bottom:16px;
  }

  /* ── Toast ── */
  .toast-wrap {
    position:fixed; bottom:24px; right:24px; z-index:9999;
    display:flex; flex-direction:column; gap:8px;
  }
  .toast {
    background:var(--navy); color:#fff;
    padding:12px 18px; border-radius:12px;
    font-size:.85rem; font-weight:500;
    box-shadow:var(--shadow-lg);
    animation:slideRight .35s ease;
    display:flex; align-items:center; gap:8px;
  }

  /* ── Section layout ── */
  .session-layout { display:flex; flex-direction:column; min-height:calc(100vh - 67px); }

  /* ── Empty state ── */
  .col-empty { padding:40px 20px; text-align:center; color:var(--muted2); font-size:.85rem; }
  .col-empty-icon { font-size:2rem; margin-bottom:8px; opacity:.4; }

  /* ── Mobile ── */
  @media(max-width:768px) {
    .board-grid { grid-template-columns:1fr; }
    .input-phase-wrap { flex-direction:column; }
    .input-sidebar { width:100%; border-right:none; border-bottom:1px solid var(--border); }
    .phase-banner { padding:12px 16px; }
    .fac-controls { gap:6px; }
  }

  /* drag */
  .dragging { opacity:.5; transform:rotate(3deg) scale(.97); }
  .drag-over { outline:2px dashed var(--primary); outline-offset:4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useContext, createContext } = React;

// ─── Config ───────────────────────────────────────────────────────────────────
const WS_BASE  = `${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
const API_BASE = `${location.protocol}//${location.host}`;

const genId = () => 'c_' + Math.random().toString(36).slice(2,10);
let MY_ID = localStorage.getItem('retro_client_id');
if(!MY_ID){ MY_ID = genId(); localStorage.setItem('retro_client_id',MY_ID); }

const fmt = ms => {
  const s = Math.max(0,Math.ceil(ms/1000));
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
};

// Note colors & tilts per section
const NOTE_COLORS = ['#FFF9C4','#FFE0B2','#F8BBD9','#C8E6C9','#B3E5FC','#E1BEE7'];
const NOTE_TILTS  = ['-1.2deg','1.5deg','-0.8deg','1deg','-1.8deg','0.6deg'];
const COL_ICONS   = ['✨','⚡','🚀','💡','🎯','🌱'];
const COL_COLORS  = ['#FFF3E0','#FCE4EC','#E8F5E9','#E3F2FD','#F3E5F5','#E0F7FA'];
const COL_ICON_BG = ['#FF8C00','#E91E63','#43A047','#1E88E5','#8E24AA','#00ACC1'];

const avatarColor = name => {
  const colors = ['#E85D3F','#2A9D8F','#E9A227','#6B9E7A','#264653','#9C6B98'];
  let hash = 0;
  for(let c of (name||'?')) hash = c.charCodeAt(0)+((hash<<5)-hash);
  return colors[Math.abs(hash)%colors.length];
};

// ─── Toast ────────────────────────────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts] = useState([]);
  const push = useCallback((msg,icon='✓')=>{
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,icon}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className="toast">{t.icon} {t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = ()=>useContext(ToastCtx);

// ─── Hash router ──────────────────────────────────────────────────────────────
function useHash(){
  const [h,setH] = useState(location.hash);
  useEffect(()=>{
    const fn=()=>setH(location.hash);
    window.addEventListener('hashchange',fn);
    return ()=>window.removeEventListener('hashchange',fn);
  },[]);
  return h;
}

// ─── Timer Ring ───────────────────────────────────────────────────────────────
function TimerRing({endMs,running,totalMs}){
  const [now,setNow] = useState(Date.now());
  useEffect(()=>{
    if(!running) return;
    const t=setInterval(()=>setNow(Date.now()),250);
    return ()=>clearInterval(t);
  },[running]);
  const rem = endMs?Math.max(0,endMs-now):0;
  const pct = endMs?rem/(totalMs||1):1;
  const r=20; const circ=2*Math.PI*r;
  const offset=circ*(1-pct);
  const warn=rem<60000&&rem>0;
  return (
    <div className="timer-block">
      <div className="timer-ring">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <circle className="ring-bg" cx="24" cy="24" r={r}/>
          <circle className={`ring-fg${warn?' warn':''}`} cx="24" cy="24" r={r}
            strokeDasharray={circ} strokeDashoffset={offset}/>
        </svg>
        <div className={`ring-text${warn?' warn':''}`}>{endMs?fmt(rem):'–'}</div>
      </div>
      <div className="timer-info">
        <div className="timer-label">{running?'Time Left':endMs?'Paused':'Timer'}</div>
        <div className={`timer-value${warn?' warn':''}`}>{endMs?fmt(rem):'--:--'}</div>
      </div>
    </div>
  );
}

// ─── Progress Steps ───────────────────────────────────────────────────────────
function Steps({session}){
  const {sections,currentSectionIndex,phase} = session;
  return (
    <div className="steps">
      {sections.map((s,i)=>{
        const done=i<currentSectionIndex||phase==='voting'||phase==='done';
        const active=i===currentSectionIndex&&phase!=='voting'&&phase!=='done';
        return (
          <div key={s.id} className="step-item">
            <div className={`step-dot${active?' active':done?' done':''}`}>{i+1}</div>
            {i<sections.length-1&&<div className={`step-line${done?' done':''}`}/>}
          </div>
        );
      })}
    </div>
  );
}

// ─── Phase Banner ─────────────────────────────────────────────────────────────
function PhaseBanner({session,send}){
  const {phase,sections,currentSectionIndex,timerRunning,timerEnd} = session;
  const sec = sections[currentSectionIndex];
  const totalMs = sec?sec.timeboxMinutes*60*1000:0;
  const pills = {
    waiting:  <span className="phase-pill pill-waiting"><span className="pill-dot"/>Waiting</span>,
    input:    <span className="phase-pill pill-input"><span className="pill-dot"/>Writing</span>,
    revealed: <span className="phase-pill pill-revealed"><span className="pill-dot"/>Revealed</span>,
    voting:   <span className="phase-pill pill-voting"><span className="pill-dot"/>Voting</span>,
    done:     <span className="phase-pill pill-done"><span className="pill-dot"/>Done</span>,
  };
  return (
    <div className="phase-banner">
      <div className="phase-left">
        <Steps session={session}/>
        {sec&&phase!=='voting'&&phase!=='done'&&(
          <div>
            <div className="section-label-small">Current Section</div>
            <div className="section-name-big">{sec.name}</div>
          </div>
        )}
        {(phase==='voting'||phase==='done')&&(
          <div>
            <div className="section-label-small">All Sections</div>
            <div className="section-name-big">Discussion Board</div>
          </div>
        )}
        {pills[phase]}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        {(phase==='input'||phase==='waiting')&&(
          <TimerRing endMs={timerEnd} running={timerRunning} totalMs={totalMs}/>
        )}
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'.7rem',color:'var(--muted)',fontWeight:600}}>
            {Object.keys(session.participants).length} joined
          </div>
          <div style={{fontSize:'.7rem',color:'var(--muted2)'}}>
            ID: <code style={{color:'var(--primary)',fontWeight:700}}>{session.id}</code>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Facilitator Panel ────────────────────────────────────────────────────────
function FacPanel({session,send}){
  const toast = useToast();
  if(session.facilitatorId!==MY_ID) return null;
  const {phase,sections,currentSectionIndex,timerRunning} = session;
  const isLast = currentSectionIndex>=sections.length-1;

  const handleExport = async()=>{
    const r = await fetch(`/api/sessions/${session.id}/export`,{method:'POST'});
    const {text} = await r.json();
    const blob=new Blob([text],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`retro-${session.id}.txt`; a.click();
    URL.revokeObjectURL(url); toast('Session exported!','📄');
  };

  return (
    <div className="fac-panel">
      <div className="fac-panel-header">
        <span className="fac-badge">🎯 Facilitator Controls</span>
        <div className="fac-divider"/>
        {session.locked&&<span style={{fontSize:'.75rem',color:'var(--muted)',fontWeight:600}}>🔒 Board Locked</span>}
      </div>
      <div className="fac-controls">
        {(phase==='waiting'||phase==='input')&&!timerRunning&&(
          <button className="btn btn-primary btn-sm" onClick={()=>send({type:'fac_start_timer'})}>▶ Start Timer</button>
        )}
        {phase==='input'&&timerRunning&&(
          <button className="btn btn-amber btn-sm" onClick={()=>send({type:'fac_pause_timer'})}>⏸ Pause</button>
        )}
        {phase==='input'&&!timerRunning&&session.timerPausedRemaining&&(
          <button className="btn btn-sage btn-sm" onClick={()=>send({type:'fac_resume_timer'})}>▶ Resume</button>
        )}
        {(phase==='input'||phase==='waiting')&&(
          <button className="btn btn-teal btn-sm" onClick={()=>{send({type:'fac_reveal'});toast('Cards revealed! 🎉','✨')}}>✨ Reveal Cards</button>
        )}
        {phase==='revealed'&&!isLast&&(
          <button className="btn btn-primary btn-sm" onClick={()=>send({type:'fac_next_section'})}>→ Next Section</button>
        )}
        {(phase==='revealed'||(phase==='input'&&isLast))&&(
          <button className="btn btn-amber btn-sm" onClick={()=>send({type:'fac_start_voting'})}>🗳 Open Voting</button>
        )}
        {phase==='voting'&&(
          <button className="btn btn-sage btn-sm" onClick={()=>send({type:'fac_end_session'})}>✅ End Session</button>
        )}
        <button className={`btn btn-sm ${session.locked?'btn-sage':'btn-outline'}`}
          onClick={()=>send({type:'fac_toggle_lock'})}>
          {session.locked?'🔓 Unlock':'🔒 Lock'}
        </button>
        <button className="btn btn-danger btn-sm"
          onClick={()=>{if(confirm('Reset the entire board?'))send({type:'fac_reset'})}}>↺ Reset</button>
        {(phase==='voting'||phase==='done')&&(
          <button className="btn btn-outline btn-sm" onClick={handleExport}>📄 Export</button>
        )}
      </div>
    </div>
  );
}

// ─── Sticky Note Card ─────────────────────────────────────────────────────────
function StickyCard({card,session,send,sectionIndex,animDelay=0}){
  const [showComments,setShowComments] = useState(false);
  const [commentText,setCommentText] = useState('');
  const isFac = session.facilitatorId===MY_ID;
  const isOwner = card.participantId===MY_ID;
  const votesUsed = Object.values(session.cards).reduce((a,c)=>a+(c.votes.includes(MY_ID)?1:0),0);
  const hasVoted = card.votes.includes(MY_ID);
  const author = session.participants[card.participantId]||'Unknown';
  const phase = session.phase;
  const color = NOTE_COLORS[sectionIndex%NOTE_COLORS.length];
  const tilt  = NOTE_TILTS[(card.order%NOTE_TILTS.length)];

  const addComment = ()=>{
    if(!commentText.trim()) return;
    send({type:'add_comment',cardId:card.id,text:commentText.trim()});
    setCommentText('');
  };

  return (
    <div className={`sticky-note revealed`}
      style={{'--tilt':tilt, background:color, animationDelay:`${animDelay}ms`}}>
      <div className="note-text">{card.text}</div>
      <div className="note-author">— {author}</div>
      <div className="note-actions">
        {(phase==='voting'||phase==='done')&&(
          <button className={`vote-btn${hasVoted?' voted':''}`}
            onClick={()=>send({type:'vote',cardId:card.id})}
            disabled={!hasVoted&&votesUsed>=3}>
            <span className="vote-circle"/>
            {card.votes.length}
          </button>
        )}
        {isFac&&(
          <button className={`note-action-btn star${card.highlighted?' on':''}`}
            onClick={()=>send({type:'fac_toggle_highlight',cardId:card.id})}>
            {card.highlighted?'⭐':'☆'}
          </button>
        )}
        <button className="note-action-btn"
          onClick={()=>setShowComments(v=>!v)}>
          💬 {card.comments.length||''}
        </button>
        {(isOwner||isFac)&&!session.locked&&(
          <button className="note-action-btn danger"
            onClick={()=>send({type:'delete_card',cardId:card.id})}>✕</button>
        )}
      </div>
      {showComments&&(
        <div className="comments-area">
          {card.comments.map(c=>(
            <div key={c.id} className="comment-row">
              <div className="comment-author-sm">{session.participants[c.authorId]||'?'}</div>
              <div className="comment-text-sm">{c.text}</div>
            </div>
          ))}
          <div className="comment-input-row">
            <input className="comment-input" placeholder="Add a comment…"
              value={commentText} onChange={e=>setCommentText(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addComment()}/>
            <button className="btn btn-primary btn-sm" onClick={addComment}>Send</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Board View ───────────────────────────────────────────────────────────────
function BoardView({session,send}){
  const [dragCard,setDragCard]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const votesUsed = Object.values(session.cards).reduce((a,c)=>a+(c.votes.includes(MY_ID)?1:0),0);
  const phase = session.phase;

  return (
    <div className="board-wrap">
      {phase==='voting'&&(
        <div style={{marginBottom:20}}>
          <div className="votes-remaining">
            🗳 {3-votesUsed} vote{3-votesUsed!==1?'s':''} remaining
            <span style={{fontWeight:400,color:'rgba(233,162,39,.7)'}}>· click dots to vote</span>
          </div>
        </div>
      )}
      <div className="board-grid">
        {session.sections.map((sec,si)=>{
          const cards = Object.values(session.cards)
            .filter(c=>c.sectionId===sec.id)
            .sort((a,b)=>(b.votes.length-a.votes.length)||a.order-b.order);
          return (
            <div key={sec.id}
              className={`board-col${dragOver===sec.id?' drag-over':''}`}
              onDragOver={e=>{e.preventDefault();setDragOver(sec.id);}}
              onDragLeave={()=>setDragOver(null)}
              onDrop={()=>setDragOver(null)}>
              <div className="col-header" style={{background:COL_COLORS[si%COL_COLORS.length]}}>
                <div className="col-icon" style={{background:COL_ICON_BG[si%COL_ICON_BG.length]}}>
                  <span style={{fontSize:'1rem'}}>{COL_ICONS[si%COL_ICONS.length]}</span>
                </div>
                <div className="col-title-text">{sec.name}</div>
                <div className="col-count">{cards.length}</div>
              </div>
              <div className="col-body">
                {cards.length===0&&(
                  <div className="col-empty">
                    <div className="col-empty-icon">📝</div>
                    No cards yet
                  </div>
                )}
                {cards.map((card,ci)=>(
                  <div key={card.id}
                    draggable
                    onDragStart={()=>setDragCard(card.id)}
                    onDragEnd={()=>setDragCard(null)}
                    className={dragCard===card.id?'dragging':''}>
                    <StickyCard card={card} session={session} send={send}
                      sectionIndex={si} animDelay={ci*70+si*150}/>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Input Phase View ─────────────────────────────────────────────────────────
function InputView({session,send}){
  const sec = session.sections[session.currentSectionIndex];
  const myCards = Object.values(session.cards).filter(c=>c.sectionId===sec?.id&&c.participantId===MY_ID);
  const otherCards = Object.values(session.cards).filter(c=>c.sectionId===sec?.id&&c.participantId!==MY_ID);
  const [draft,setDraft] = useState('');
  const si = session.currentSectionIndex;

  const addCard = ()=>{
    if(!draft.trim()||session.locked) return;
    send({type:'add_card',sectionId:sec.id,text:draft.trim()});
    setDraft('');
  };

  return (
    <div className="input-phase-wrap">
      {/* Sidebar - my cards */}
      <div className="input-sidebar">
        <div style={{marginBottom:20}}>
          <div className="label">Your Cards</div>
          <div style={{color:'var(--muted)',fontSize:'.83rem',lineHeight:1.6}}>
            Cards are private until the facilitator reveals them.
          </div>
        </div>
        {myCards.map(card=>(
          <div key={card.id} className="my-card-item">
            <textarea rows={2} defaultValue={card.text}
              disabled={session.locked}
              onChange={e=>send({type:'update_card',cardId:card.id,text:e.target.value})}/>
            {!session.locked&&(
              <button className="btn btn-danger btn-sm"
                style={{padding:'3px 8px',alignSelf:'flex-start',flexShrink:0}}
                onClick={()=>send({type:'delete_card',cardId:card.id})}>✕</button>
            )}
          </div>
        ))}
        {!session.locked&&(
          <div style={{display:'flex',gap:8,marginTop:4}}>
            <input className="input" style={{flex:1}} placeholder="Type your thought…"
              value={draft} onChange={e=>setDraft(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),addCard())}/>
            <button className="btn btn-primary btn-sm" onClick={addCard}>Add</button>
          </div>
        )}
        {session.locked&&(
          <div style={{padding:'12px 14px',background:'#FEE2E2',borderRadius:'var(--radius-sm)',fontSize:'.83rem',color:'#DC2626',fontWeight:600}}>
            🔒 Board is locked by facilitator
          </div>
        )}
      </div>

      {/* Preview - others' hidden cards */}
      <div className="input-preview">
        <div style={{marginBottom:20}}>
          <div className="label">Section: {sec?.name}</div>
          <div style={{color:'var(--muted)',fontSize:'.83rem'}}>
            Other participants' cards are hidden until reveal.
          </div>
        </div>

        {/* Mini board preview with hidden notes */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12}}>
          {myCards.map(card=>(
            <div key={card.id} className="sticky-note"
              style={{'--tilt':NOTE_TILTS[Math.random()*NOTE_TILTS.length|0],background:NOTE_COLORS[si%NOTE_COLORS.length]}}>
              <div className="note-text" style={{fontSize:'.82rem'}}>{card.text}</div>
              <div className="note-author">— You</div>
            </div>
          ))}
          {otherCards.map((_,i)=>(
            <div key={i} className="hidden-note">
              <div className="shimmer-line" style={{width:'90%'}}/>
              <div className="shimmer-line" style={{width:'65%'}}/>
              <div className="hidden-label">🔒 hidden</div>
            </div>
          ))}
          {myCards.length===0&&otherCards.length===0&&(
            <div style={{gridColumn:'1/-1',textAlign:'center',padding:'40px',color:'var(--muted2)',fontSize:'.88rem'}}>
              Be the first to add a card! 👆
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Done View ────────────────────────────────────────────────────────────────
function DoneView({session,send}){
  const myRoti = session.roti[MY_ID];
  const vals = Object.values(session.roti);
  const avg = vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
  return (
    <div style={{flex:1}}>
      <BoardView session={session} send={send}/>
      <div className="roti-section">
        <div className="roti-card">
          <div style={{fontSize:'2.5rem',marginBottom:12}}>🎉</div>
          <div className="roti-title">Session Complete!</div>
          <div className="roti-sub">How well did we use our time together?<br/>Rate your Return on Time Invested.</div>
          <div style={{fontSize:'.78rem',color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>
            1 = Poor &nbsp;·&nbsp; 5 = Excellent
          </div>
          <div className="roti-btns">
            {[1,2,3,4,5].map(n=>(
              <button key={n} className={`roti-btn${myRoti===n?' selected':''}`}
                onClick={()=>send({type:'roti',rating:n})}>{n}</button>
            ))}
          </div>
          {avg&&(
            <div className="roti-avg">
              Team average: <strong>{avg}/5</strong> from {vals.length} rating{vals.length!==1?'s':''}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Waiting Screen ───────────────────────────────────────────────────────────
function WaitingScreen({session}){
  const sec = session.sections[session.currentSectionIndex];
  return (
    <div className="waiting-screen">
      <div className="waiting-emoji">⏳</div>
      <div className="waiting-title">Waiting to start…</div>
      <div className="waiting-sub">
        The facilitator will start the timer for<br/>
        <strong style={{color:'var(--primary)'}}>{sec?.name}</strong>
      </div>
      <div style={{marginTop:28,display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        {Object.entries(session.participants).map(([id,name])=>(
          <div key={id} className="p-chip">
            <div className="p-avatar" style={{background:avatarColor(name)}}>
              {name[0]?.toUpperCase()}
            </div>
            {name}
            {session.facilitatorId===id&&<span className="p-fac-badge">🎯</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Participant Setup ────────────────────────────────────────────────────────
function ParticipantSetup({sessionId,onJoin}){
  const [name,setName]=useState('');
  const [isFac,setIsFac]=useState(false);
  const [facTaken,setFacTaken]=useState(false);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    fetch(`/api/sessions/${sessionId}`)
      .then(r=>r.json())
      .then(s=>setFacTaken(s.facilitatorId!==null))
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  const handle=()=>{
    const n=name.trim()||'Anonymous';
    onJoin(n,isFac&&!facTaken);
  };

  if(loading) return (
    <div className="setup-wrap">
      <div style={{color:'var(--muted)',fontSize:'.9rem'}}>Loading session…</div>
    </div>
  );

  return (
    <div className="setup-wrap">
      <div className="setup-card">
        <span className="setup-emoji">👋</span>
        <div className="setup-title">Join Session</div>
        <div className="setup-sub">Enter your name to join the retrospective. Your cards will stay private until revealed.</div>
        <label className="label">Your Name</label>
        <input className="input" style={{marginBottom:20}} placeholder="e.g. Sarah"
          value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handle()} autoFocus/>
        <div className="checkbox-row" onClick={()=>!facTaken&&setIsFac(v=>!v)}>
          <input type="checkbox" id="fac-cb" checked={isFac&&!facTaken}
            disabled={facTaken}
            onChange={e=>!facTaken&&setIsFac(e.target.checked)}
            onClick={e=>{
              if(facTaken){e.preventDefault();alert('A facilitator has already joined! Please join as a participant.');}
            }}/>
          <label className="checkbox-label" htmlFor="fac-cb" style={{cursor:facTaken?'not-allowed':'pointer',opacity:facTaken?.5:1}}>
            🎯 I'm the Facilitator (Scrum Master)
          </label>
          {facTaken&&(
            <span className="fac-warning">⛔ Already taken</span>
          )}
        </div>
        <button className="btn btn-primary btn-xl" style={{width:'100%'}} onClick={handle}>
          Join Retrospective →
        </button>
      </div>
    </div>
  );
}

// ─── Session Page ─────────────────────────────────────────────────────────────
function SessionPage({sessionId}){
  const [session,setSession]=useState(null);
  const [joined,setJoined]=useState(false);
  const [error,setError]=useState(null);
  const wsRef=useRef(null);
  const toast=useToast();
  const myName=useRef(null);

  const connect=useCallback((name,isFac)=>{
    myName.current=name;
    const ws=new WebSocket(`${WS_BASE}/ws/${sessionId}/${MY_ID}`);
    wsRef.current=ws;
    ws.onopen=()=>{ ws.send(JSON.stringify({type:'join',name,isFacilitator:isFac})); setJoined(true); };
    ws.onmessage=e=>{
      const msg=JSON.parse(e.data);
      if(msg.type==='session_update'){
        setSession(prev=>{
          const s=msg.session;
          if(prev&&prev.phase!==s.phase){
            if(s.phase==='revealed') toast('Cards revealed! Time to discuss 🎉','✨');
            if(s.phase==='voting')   toast('Voting is open! Cast your dots 🗳','🗳');
            if(s.phase==='done')     toast('Session complete! Great retro 🎊','✅');
          }
          return s;
        });
      }
    };
    ws.onerror=()=>setError('Connection error. Please refresh.');
    ws.onclose=()=>{ if(myName.current) setTimeout(()=>connect(myName.current,false),2000); };
  },[sessionId]);

  const send=useCallback(msg=>{ if(wsRef.current?.readyState===1) wsRef.current.send(JSON.stringify(msg)); },[]);
  const shareUrl=`${location.origin}/#session/${sessionId}`;

  if(error) return (
    <div className="setup-wrap">
      <div className="setup-card" style={{textAlign:'center'}}>
        <span className="setup-emoji">⚠️</span>
        <div className="setup-title">Connection Error</div>
        <div className="setup-sub">{error}</div>
        <button className="btn btn-primary" onClick={()=>location.reload()}>Retry</button>
      </div>
    </div>
  );

  if(!joined||!session) return <ParticipantSetup sessionId={sessionId} onJoin={connect}/>;

  const phase=session.phase;

  return (
    <div className="session-layout">
      <PhaseBanner session={session} send={send}/>
      {/* Share strip */}
      <div className="share-strip">
        <span className="share-label">Share Link</span>
        <div className="share-url-box">
          <span className="share-url">{shareUrl}</span>
          <button className="btn btn-outline btn-sm"
            onClick={()=>{navigator.clipboard.writeText(shareUrl);toast('Link copied!','🔗')}}>
            Copy
          </button>
        </div>
      </div>
      <FacPanel session={session} send={send}/>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
        {phase==='waiting'  && <WaitingScreen session={session}/>}
        {phase==='input'    && <InputView session={session} send={send}/>}
        {phase==='revealed' && <BoardView session={session} send={send}/>}
        {phase==='voting'   && <BoardView session={session} send={send}/>}
        {phase==='done'     && <DoneView  session={session} send={send}/>}
      </div>

      {/* Participants bar */}
      <div className="participants-bar">
        <span className="p-label">In session</span>
        {Object.entries(session.participants).map(([id,name])=>(
          <div key={id} className="p-chip">
            <div className="p-avatar" style={{background:avatarColor(name)}}>
              {name[0]?.toUpperCase()}
            </div>
            {name}
            {session.facilitatorId===id&&<span className="p-fac-badge">🎯</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Landing Page ─────────────────────────────────────────────────────────────
const DEFAULT_SECTIONS=[
  {name:'What went well',  timeboxMinutes:6},
  {name:'What went wrong', timeboxMinutes:6},
  {name:'Improvements',    timeboxMinutes:8},
];

function LandingPage(){
  const [tab,setTab]=useState('create');
  const [name,setName]=useState('');
  const [sections,setSecs]=useState(DEFAULT_SECTIONS);
  const [joinId,setJoinId]=useState('');
  const [loading,setLoading]=useState(false);
  const toast=useToast();

  const addSec=()=>setSecs(s=>[...s,{name:'',timeboxMinutes:5}]);
  const remSec=i=>setSecs(s=>s.filter((_,j)=>j!==i));
  const updSec=(i,f,v)=>setSecs(s=>s.map((x,j)=>j===i?{...x,[f]:v}:x));

  const create=async()=>{
    const secs=sections.map(s=>({id:'s_'+Math.random().toString(36).slice(2,8),name:s.name.trim()||'Section',timeboxMinutes:Number(s.timeboxMinutes)||5}));
    setLoading(true);
    try{
      const r=await fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:name.trim()||'Retrospective',sections:secs,anonymous:false})});
      const {sessionId}=await r.json();
      location.hash=`#session/${sessionId}`;
    }catch(e){ toast('Failed to create session','❌'); }
    finally{ setLoading(false); }
  };

  const join=()=>{
    const id=joinId.trim();
    if(!id) return toast('Enter a session ID or URL','⚠️');
    const m=id.match(/session\/([a-z0-9]+)/i);
    location.hash=`#session/${m?m[1]:id}`;
  };

  return (
    <div className="landing">
      {/* Decorative floating notes */}
      <div className="deco-note" style={{background:NOTE_COLORS[0],top:'15%',right:'8%',transform:'rotate(6deg)',animationDelay:'.5s'}}>
        ✨ What went well?
      </div>
      <div className="deco-note" style={{background:NOTE_COLORS[1],top:'35%',right:'4%',transform:'rotate(-4deg)',animationDelay:'1.2s',fontSize:'.7rem'}}>
        ⚡ Blockers?
      </div>
      <div className="deco-note" style={{background:NOTE_COLORS[2],top:'55%',right:'10%',transform:'rotate(3deg)',animationDelay:'.8s'}}>
        🚀 Improvements!
      </div>

      <div className="landing-inner">
        <div className="landing-eyebrow anim-fade-up" style={{animationDelay:'.05s'}}>
          <span className="eyebrow-dot"/>
          Real-time Sprint Retrospectives
        </div>
        <div className="landing-title anim-fade-up" style={{animationDelay:'.1s'}}>
          Run retros that<br/><span className="accent">actually work.</span>
        </div>
        <div className="landing-sub anim-fade-up" style={{animationDelay:'.15s'}}>
          Private input, simultaneous reveal, structured discussion —
          everything your team needs for a focused retrospective.
        </div>

        <div className="panel anim-fade-up" style={{animationDelay:'.2s'}}>
          <div className="panel-tabs">
            <button className={`panel-tab${tab==='create'?' active':''}`} onClick={()=>setTab('create')}>
              ✦ Create Session
            </button>
            <button className={`panel-tab${tab==='join'?' active':''}`} onClick={()=>setTab('join')}>
              → Join Session
            </button>
          </div>
          <div className="panel-body">
            {tab==='create'&&(
              <div className="anim-fade-in">
                <label className="label">Session Name</label>
                <input className="input" style={{marginBottom:20}}
                  placeholder="e.g. Sprint 42 Retrospective"
                  value={name} onChange={e=>setName(e.target.value)}/>

                <label className="label">Sections & Timeboxes</label>
                {sections.map((sec,i)=>(
                  <div key={i} className="section-item">
                    <input type="text" placeholder="Section name"
                      value={sec.name} onChange={e=>updSec(i,'name',e.target.value)}/>
                    <div style={{display:'flex',alignItems:'center',gap:4}}>
                      <input type="number" className="time-input" min={1} max={60}
                        value={sec.timeboxMinutes}
                        onChange={e=>updSec(i,'timeboxMinutes',e.target.value)}/>
                      <span style={{fontSize:'.75rem',color:'var(--muted)',fontWeight:600}}>min</span>
                    </div>
                    {sections.length>1&&(
                      <button className="remove-btn" onClick={()=>remSec(i)}>✕</button>
                    )}
                  </div>
                ))}
                <button className="add-section-btn" onClick={addSec}>+ Add Section</button>
                <button className="btn btn-primary btn-lg" style={{width:'100%'}}
                  onClick={create} disabled={loading}>
                  {loading?'Creating…':'Create Retrospective →'}
                </button>
              </div>
            )}
            {tab==='join'&&(
              <div className="anim-fade-in">
                <label className="label">Session ID or Link</label>
                <input className="input" style={{marginBottom:20}}
                  placeholder="Paste link or enter session ID"
                  value={joinId} onChange={e=>setJoinId(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&join()}/>
                <button className="btn btn-primary btn-lg" style={{width:'100%'}} onClick={join}>
                  Join Retrospective →
                </button>
                <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',fontSize:'.83rem',color:'var(--muted)',lineHeight:1.7}}>
                  💡 Ask your Scrum Master to share the session link, then paste it above.
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const hash=useHash();
  const m=hash.match(/#session\/([a-z0-9]+)/i);
  const sessionId=m?m[1]:null;
  return (
    <ToastProvider>
      <nav className="nav">
        <a className="logo" href="#">
          <div className="logo-mark">📋</div>
          <div className="logo-text">Retro<span>Board</span></div>
        </a>
        <div className="nav-right">
          {sessionId&&(
            <button className="btn btn-outline btn-sm"
              onClick={()=>{if(confirm('Leave this session?'))location.hash=''}}>
              ← Home
            </button>
          )}
        </div>
      </nav>
      {sessionId
        ? <SessionPage key={sessionId} sessionId={sessionId}/>
        : <LandingPage/>
      }
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
